spring:
  application:
    name: otvoreni-podaci
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
      continue-on-error: true

server:
  port: 8080

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info

euprava:
  jwt:
    secret: change-me-in-prod-please-this-is-a-demo-secret-key-32bytes-min
    expiration-ms: 86400000
  import:
    api-key: demo-shared-api-key-between-services
  zdravstvo:
    # Base-URL Zdravstvo servisa za razmenu #4 (OP -> Zd notifikacije).
    # U Docker-u: http://zdravstvo:8080 ; lokalno: http://localhost:8080.
    base-url: ${ZDRAVSTVO_BASE_URL:http://localhost:8080}
    api-key: demo-shared-api-key-between-services
